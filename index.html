<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pitz Invest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10d98a;
    --red: #ff4d6d;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #0d1b2e 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  /* View Toggle */
  .view-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
  }
  .toggle-btn {
    flex: 1;
    padding: 8px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toggle-btn.active {
    background: var(--accent);
    color: var(--bg);
  }
  /* Main container */
  .container { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* Investor selector */
  .investor-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .investor-scroll::-webkit-scrollbar { display: none; }
  .investor-chip {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .investor-chip.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.12);
    color: var(--accent);
  }
  .investor-chip:hover:not(.active) {
    border-color: var(--accent2);
    color: var(--text);
  }

  /* Summary Cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    border-radius: 2px 0 0 2px;
  }
  .summary-card.green::before { background: var(--green); }
  .summary-card.red::before { background: var(--red); }
  .summary-card.yellow::before { background: var(--yellow); }
  .summary-card.purple::before { background: var(--accent2); }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .card-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
  }
  .card-value.positive { color: var(--green); }
  .card-value.negative { color: var(--red); }

  /* Lucro Mensal */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .monthly-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .month-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .month-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .month-value {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }
  .month-value.negative { color: var(--red); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .table-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .table-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .count-badge {
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,212,255,0.1);
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .table-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  thead th {
    padding: 10px 12px;
    text-align: right;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface2);
  }
  thead th:first-child { text-align: left; }
  tbody tr {
    border-bottom: 1px solid rgba(30,45,69,0.5);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,212,255,0.04); }
  td {
    padding: 11px 12px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    white-space: nowrap;
  }
  td:first-child {
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
  }
  td.positive { color: var(--green); }
  td.negative { color: var(--red); }
  /* Total row */
  .total-row td {
    border-top: 2px solid var(--border);
    font-weight: 700;
    background: var(--surface2);
  }
  .total-row td:first-child { color: var(--text); font-family: 'DM Mono', monospace; }

  /* By Action view */
  .action-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .action-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .action-header:hover { background: rgba(0,212,255,0.06); }
  .action-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .action-meta {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .action-result {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .action-body { overflow: hidden; }
  .action-investors {
    padding: 0 16px 12px;
  }
  .investor-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    font-size: 12px;
    gap: 8px;
  }
  .investor-row:last-child { border-bottom: none; }
  .inv-name {
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 80px;
  }
  .inv-data {
    display: flex;
    gap: 16px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .inv-data span { white-space: nowrap; }

  /* No data */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Responsive tweaks */
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .monthly-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Animations */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-left: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ==============================
const fmt = (n, decimals=2) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('pt-BR', {minimumFractionDigits:decimals, maximumFractionDigits:decimals}).format(n);
};
const fmtR = (n) => {
  if (!n && n !== 0) return '—';
  const cls = n >= 0 ? 'positive' : 'negative';
  const sign = n >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}R$ ${fmt(n)}</span>`;
};
const fmtPct = (n) => {
  if (!n && n !== 0) return '—';
  const cls = n >= 0 ? 'positive' : 'negative';
  const sign = n >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${fmt(n*100,1)}%</span>`;
};
const fmtMoney = (n) => n ? `R$ ${fmt(n)}` : '—';
const fmtMoneyUSD = (n, label) => {
  if (!n) return '—';
  const sym = label && (label.includes('CS') || ['ORCL','HPQ','COP','CVX','BKI','CERT','FEVR'].some(s => label.includes(s))) ? 'US$ ' : 'R$ ';
  return sym + fmt(n);
};

function setView(v) {
  currentView = v;
  document.querySelectorAll('.toggle-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && v==='investor') || (i===1 && v==='action'));
  });
  renderContent();
}

function selectInvestor(inv) {
  selectedInvestor = inv;
  renderContent();
}

function renderContent() {
  const el = document.getElementById('app-content');
  el.innerHTML = '';
  el.className = 'fade-in';
  void el.offsetWidth;

  if (currentView === 'investor') {
    el.appendChild(renderInvestorView());
  } else {
    el.appendChild(renderActionView());
  }
}

    ccCards = [
      {label:'Saldo C.C. UBS', val:`$ ${fmt(saldosCC["NUNAM UBS"])}`, cls:'yellow'},
      {label:'Saldo C.C. CS',  val:`$ ${fmt(saldosCC["NUNAM CS"])}`,  cls:'yellow'},
    ];
    totalCC = (saldosCC["NUNAM UBS"]||0) + (saldosCC["NUNAM CS"]||0);
  } else {
    const ccKey = Object.keys(saldosCC).find(k => k.toUpperCase() === selectedInvestor.toUpperCase());
    if (ccKey) {
      totalCC = saldosCC[ccKey];
      ccCards = [{label:'Saldo C.C.', val:`R$ ${fmt(totalCC)}`, cls:'yellow'}];
    }
  }

  // Summary cards
  const grid = document.createElement('div');
  grid.className = 'summary-grid';

  const cards = [
    {label:'Total Investido', val:`R$ ${fmt(totalInvestido)}`, cls:''},
    {label:'Valor Atual', val:`R$ ${fmt(totalAtual)}`, cls: totalAtual >= totalInvestido ? 'green' : 'red'},
    {label:'Resultado', val:(totalResult>=0?'+':'')+'R$ '+fmt(totalResult), cls: totalResult>=0?'green':'red'},
    {label:'Retorno %', val:(pctGeral>=0?'+':'')+fmt(pctGeral*100,2)+'%', cls: pctGeral>=0?'green':'red'},
    ...ccCards,
  ];

  if (totalCC > 0) {
    const pat = isNunam
      ? `$ ${fmt(totalAtual + totalCC)}`
      : `R$ ${fmt(totalAtual + totalCC)}`;
    cards.push({label:'Patrimônio Total', val: pat, cls:'purple'});
  }

  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = `summary-card ${c.cls}`;
    card.innerHTML = `<div class="card-label">${c.label}</div><div class="card-value">${c.val}</div>`;
    grid.appendChild(card);
  });
  frag.appendChild(grid);

  // Lucro mensal — NUNAM shows UBS + CS separately in $
  if (isNunam) {
    const secTitle = document.createElement('div');
    secTitle.className = 'section-title';
    secTitle.textContent = 'Lucro Acumulado por Mês';
    frag.appendChild(secTitle);

    ['NUNAM UBS', 'NUNAM CS'].forEach(subKey => {
      const meses = lucrosAcumulados[subKey];
      const subLabel = document.createElement('div');
      subLabel.style.cssText = 'font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;';
      subLabel.textContent = subKey;
      frag.appendChild(subLabel);

      const monthly = document.createElement('div');
      monthly.className = 'monthly-grid';
      monthly.style.marginBottom = '12px';
      Object.entries(meses).forEach(([mes, val]) => {
        const mc = document.createElement('div');
        mc.className = 'month-card';
        mc.innerHTML = `<div class="month-label">${mes}</div><div class="month-value ${val<0?'negative':''}">${val===0?'—':'$ '+fmt(val)}</div>`;
        monthly.appendChild(mc);
      });
      frag.appendChild(monthly);
    });
  } else {
    const lucroKey = Object.keys(lucrosAcumulados).find(k => k.toUpperCase() === selectedInvestor.toUpperCase());
    if (lucroKey) {
      const meses = lucrosAcumulados[lucroKey];
      const secTitle = document.createElement('div');
      secTitle.className = 'section-title';
      secTitle.textContent = 'Lucro Acumulado por Mês';
      frag.appendChild(secTitle);

      const monthly = document.createElement('div');
      monthly.className = 'monthly-grid';
      Object.entries(meses).forEach(([mes, val]) => {
        const mc = document.createElement('div');
        mc.className = 'month-card';
        mc.innerHTML = `<div class="month-label">${mes}</div><div class="month-value ${val<0?'negative':''}">${val===0?'—':'R$ '+fmt(val)}</div>`;
        monthly.appendChild(mc);
      });
      frag.appendChild(monthly);
    }
  }

  // Portfolio table
  const secTitle2 = document.createElement('div');
  secTitle2.className = 'section-title';
  secTitle2.textContent = 'Portfólio';
  frag.appendChild(secTitle2);

  if (data.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = allData.length > 0
      ? 'Todas as posições estão sem cotação (Último = 0) e foram ocultadas.'
      : 'Nenhuma posição registrada para este investidor.';
    frag.appendChild(empty);
    return frag;
  }

  // Sort table rows alphabetically by acao
  const dataSorted = [...data].sort((a,b) => a.acao.localeCompare(b.acao, 'pt-BR'));

  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';

  const tableHeader = document.createElement('div');
  tableHeader.className = 'table-header';
  tableHeader.innerHTML = `<div class="table-title">${selectedInvestor}</div><div class="count-badge">${data.length} ações</div>`;
  tableWrap.appendChild(tableHeader);

  const scroll2 = document.createElement('div');
  scroll2.className = 'table-scroll';
  scroll2.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Ação</th>
          <th>Qtde</th>
          <th>Compra</th>
          <th>Total</th>
          <th>Último</th>
          <th>Subtotal</th>
          <th>Resultado</th>
          <th>%</th>
        </tr>
      </thead>
      <tbody>
        ${dataSorted.map(d => `
          <tr>
            <td>${d.acao}</td>
            <td>${fmt(d.qtde,0)}</td>
            <td>${fmt(d.compra,2)}</td>
            <td>${fmt(d.total,2)}</td>
            <td>${d.ultimo === 0 ? '<span style="color:var(--muted)">—</span>' : fmt(d.ultimo,2)}</td>
            <td>${d.subtotal === 0 ? '<span style="color:var(--muted)">—</span>' : fmt(d.subtotal,2)}</td>
            <td class="${d.resultado >= 0 ? 'positive' : 'negative'}">${(d.resultado>=0?'+':'')}${fmt(d.resultado,2)}</td>
            <td class="${d.pct >= 0 ? 'positive' : 'negative'}">${d.pct===-1?'<span style="color:var(--red)">-100%</span>':(d.pct>=0?'+':'')+fmt(d.pct*100,1)+'%'}</td>
          </tr>
        `).join('')}
        <tr class="total-row">
          <td>TOTAL</td>
          <td>—</td>
          <td>—</td>
          <td>${fmt(totalInvestido,2)}</td>
          <td>—</td>
          <td>${fmt(totalAtual,2)}</td>
          <td class="${totalResult>=0?'positive':'negative'}">${(totalResult>=0?'+':'')}${fmt(totalResult,2)}</td>
          <td class="${pctGeral>=0?'positive':'negative'}">${(pctGeral>=0?'+':'')}${fmt(pctGeral*100,1)}%</td>
        </tr>
      </tbody>
    </table>
  `;
  tableWrap.appendChild(scroll2);
  frag.appendChild(tableWrap);

  return frag;
}

function renderActionView() {
  const frag = document.createDocumentFragment();

  // Only positions from selected investors with a valid ultimo price
  const visibleInv = investimentos.filter(i => allInvestors.includes(i.inv) && i.ultimo && i.ultimo !== 0);

  // Group by action
  const byAction = {};
  visibleInv.forEach(i => {
    if (!byAction[i.acao]) byAction[i.acao] = [];
    byAction[i.acao].push(i);
  });

  // Summary total from visible only
  const totalInvestido = visibleInv.reduce((s,i) => s+(i.total||0), 0);
  const totalAtual = visibleInv.reduce((s,i) => s+(i.subtotal||0), 0);
  const totalResult = visibleInv.reduce((s,i) => s+(i.resultado||0), 0);

  const grid = document.createElement('div');
  grid.className = 'summary-grid';
  [
    {label:'Total Investido Geral', val:`R$ ${fmt(totalInvestido)}`, cls:''},
    {label:'Valor Atual Geral', val:`R$ ${fmt(totalAtual)}`, cls: totalAtual>=totalInvestido?'green':'red'},
    {label:'Resultado Geral', val:(totalResult>=0?'+':'')+'R$ '+fmt(totalResult), cls:totalResult>=0?'green':'red'},
    {label:'Investidores', val: allInvestors.length+' ativos', cls:'yellow'},
  ].forEach(c => {
    const card = document.createElement('div');
    card.className = `summary-card ${c.cls}`;
    card.innerHTML = `<div class="card-label">${c.label}</div><div class="card-value">${c.val}</div>`;
    grid.appendChild(card);
  });
  frag.appendChild(grid);

  const secTitle = document.createElement('div');
  secTitle.className = 'section-title';
  secTitle.textContent = `${Object.keys(byAction).length} Ações em Carteira`;
  frag.appendChild(secTitle);

  // Sort: BRL actions (non-NUNAM) alphabetically first, then NUNAM actions alphabetically
  const sorted = Object.entries(byAction).sort((a,b) => {
    const aIsNunam = nunamAcoes.has(a[0]);
    const bIsNunam = nunamAcoes.has(b[0]);
    if (aIsNunam !== bIsNunam) return aIsNunam ? 1 : -1;
    return a[0].localeCompare(b[0], 'pt-BR');
  });

  sorted.forEach(([acao, rows]) => {
    const totalRes = rows.reduce((s,i) => s+(i.resultado||0), 0);
    const totalInv = rows.reduce((s,i) => s+(i.total||0), 0);
    const totalSub = rows.reduce((s,i) => s+(i.subtotal||0), 0);

    const group = document.createElement('div');
    group.className = 'action-group';

    const header = document.createElement('div');
    header.className = 'action-header';
    header.innerHTML = `
      <div class="action-name">${acao}</div>
      <div class="action-meta">
        <div class="action-result ${totalRes>=0?'positive':'negative'}" style="color:${totalRes>=0?'var(--green)':'var(--red)'}">${(totalRes>=0?'+':'')+'R$ '+fmt(totalRes)}</div>
        <div class="chevron">▼</div>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'action-body';
    body.style.display = 'none';

    const investorList = document.createElement('div');
    investorList.className = 'action-investors';

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'investor-row';
      row.innerHTML = `
        <div class="inv-name">${r.inv}</div>
        <div class="inv-data">
          <span>Qtde: ${fmt(r.qtde,0)}</span>
          <span>Compra: ${fmt(r.compra,2)}</span>
          <span>Total: R$ ${fmt(r.total,2)}</span>
          <span>Último: ${r.ultimo===0?'—':fmt(r.ultimo,2)}</span>
          <span>Subtotal: ${r.subtotal===0?'—':'R$ '+fmt(r.subtotal,2)}</span>
          <span class="${r.resultado>=0?'positive':'negative'}" style="color:${r.resultado>=0?'var(--green)':'var(--red)'}">Res: ${(r.resultado>=0?'+':'')+fmt(r.resultado,2)}</span>
        </div>
      `;
      investorList.appendChild(row);
    });

    // Total row for action
    if (rows.length > 1) {
      const tot = document.createElement('div');
      tot.className = 'investor-row';
      tot.style.fontWeight = '700';
      tot.innerHTML = `
        <div class="inv-name" style="color:var(--muted)">TOTAL</div>
        <div class="inv-data">
          <span style="color:var(--text)">Inv: R$ ${fmt(totalInv)}</span>
          <span style="color:var(--text)">Atual: R$ ${fmt(totalSub)}</span>
          <span class="${totalRes>=0?'positive':'negative'}" style="color:${totalRes>=0?'var(--green)':'var(--red)'}">Res: ${(totalRes>=0?'+':'')+fmt(totalRes)}</span>
        </div>
      `;
      investorList.appendChild(tot);
    }

    body.appendChild(investorList);
    group.appendChild(header);
    group.appendChild(body);
    frag.appendChild(group);

    let open = false;
    header.onclick = () => {
      open = !open;
      body.style.display = open ? 'block' : 'none';
      header.querySelector('.chevron').style.transform = open ? 'rotate(180deg)' : '';
    };
  });

  return frag;
}

// Init
document.getElementById('date-display').textContent = new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'});
renderContent();
</script>
