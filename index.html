<title>Pitz Invest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
    --accent:#00d4ff; --accent2:#7c3aed; --green:#10d98a; --red:#ff4d6d;
    --yellow:#fbbf24; --orange:#f97316; --text:#e2e8f0; --muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .header{background:linear-gradient(135deg,#0d1b2e 0%,#111827 100%);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .date-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
  .view-toggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;border:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .view-toggle::-webkit-scrollbar{display:none;}
  .toggle-btn{flex-shrink:0;padding:8px 14px;border:none;background:transparent;color:var(--muted);border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .toggle-btn.active{background:var(--accent);color:var(--bg);}
  .container{padding:16px;max-width:900px;margin:0 auto;}
  .investor-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;}
  .investor-scroll::-webkit-scrollbar{display:none;}
  .investor-chip{flex-shrink:0;padding:7px 14px;border-radius:24px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .investor-chip.active{border-color:var(--accent);background:rgba(0,212,255,0.12);color:var(--accent);}
  .summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);border-radius:2px 0 0 2px;}
  .summary-card.green::before{background:var(--green);}
  .summary-card.red::before{background:var(--red);}
  .summary-card.yellow::before{background:var(--yellow);}
  .summary-card.purple::before{background:var(--accent2);}
  .card-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .card-value{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);word-break:break-all;}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .monthly-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .month-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
  .month-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
  .month-value{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--green);}
  .month-value.negative{color:var(--red);}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .table-header{background:var(--surface2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .table-title{font-size:13px;font-weight:700;color:var(--text);}
  .count-badge{font-size:11px;color:var(--accent);background:rgba(0,212,255,0.1);padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{padding:10px 12px;text-align:right;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2);}
  thead th:first-child{text-align:left;}
  tbody tr{border-bottom:1px solid rgba(30,45,69,0.5);transition:background 0.15s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(0,212,255,0.04);}
  td{padding:10px 12px;text-align:right;font-family:'DM Mono',monospace;color:var(--text);white-space:nowrap;}
  td:first-child{text-align:left;font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);font-size:13px;}
  td.positive{color:var(--green);}
  td.negative{color:var(--red);}
  .total-row td{border-top:2px solid var(--border);font-weight:700;background:var(--surface2);}
  .total-row td:first-child{color:var(--text);font-family:'DM Mono',monospace;}
  /* Expandable extra info */
  .expand-row td{padding:0;border-bottom:1px solid rgba(30,45,69,0.5);}
  .expand-content{padding:0 16px;max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease;background:rgba(0,0,0,0.25);}
  .expand-content.open{padding:12px 16px;max-height:200px;}
  .expand-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .expand-item .expand-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
  .expand-item .expand-val{font-family:'DM Mono',monospace;font-size:12px;}
  .expand-val.buy{color:var(--green);}
  .expand-val.sell{color:var(--orange);}
  .expand-val.divid{color:var(--yellow);}
  .row-toggle{cursor:pointer;}
  .row-toggle:hover td{background:rgba(0,212,255,0.04);}
  .row-arrow{font-size:9px;color:var(--muted);transition:transform 0.2s;display:inline-block;margin-left:4px;vertical-align:middle;}
  /* Action groups */
  .action-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
  .action-header{background:var(--surface2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .action-header:hover{background:rgba(0,212,255,0.06);}
  .action-name{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-0.3px;}
  .chevron{font-size:12px;color:var(--muted);transition:transform 0.2s;}
  .action-investors{padding:0 16px 12px;}
  .investor-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(30,45,69,0.5);font-size:12px;gap:8px;}
  .investor-row:last-child{border-bottom:none;}
  .inv-name{font-weight:600;color:var(--text);flex:1;min-width:80px;}
  .inv-data{display:flex;gap:10px;font-family:'DM Mono',monospace;color:var(--muted);font-size:11px;flex-wrap:wrap;justify-content:flex-end;}
  .inv-data span{white-space:nowrap;}
  .info-bar{padding:8px 16px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;font-family:'DM Mono',monospace;border-bottom:1px solid rgba(30,45,69,0.4);background:rgba(0,0,0,0.15);}
  /* Vendas */
  .vendas-block{margin-bottom:16px;}
  .vendas-inv-header{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:2px;}
  .vendas-inv-header:hover{background:rgba(0,212,255,0.06);}
  .vendas-inv-name{font-size:14px;font-weight:700;color:var(--accent);}
  .vendas-body{background:var(--surface);border:1px solid var(--border);border-radius:0 0 12px 12px;overflow:hidden;display:none;}
  .positive{color:var(--green);}
  .negative{color:var(--red);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .fade-in{animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:480px){.summary-grid{grid-template-columns:repeat(2,1fr);}.monthly-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

// Safe fetch - no AbortController (Safari mobile compatibility)
function fetchWithTimeout(url, ms){
  return Promise.race([
    fetch(url),
    new Promise(function(_, reject){
      setTimeout(function(){ reject(new Error('timeout')); }, ms);
    })
  ]);
}

// Fetch BR stock via Brapi
async function fetchBrapiPrice(symbol){
  try {
    var url = 'https://brapi.dev/api/quote/' + symbol + '?fundamental=false&token=' + BRAPI_TOKEN;
    var r = await fetchWithTimeout(url, 10000);
    if(!r.ok) throw new Error('status ' + r.status);
    var j = await r.json();
    var price = j && j.results && j.results[0] && j.results[0].regularMarketPrice;
    if(price) return price;
  } catch(e){ console.warn('Brapi ' + symbol + ': ' + e.message); }
  return null;
}

// Fetch USD stock via Finnhub
async function fetchFinnhubPrice(symbol){
  try {
    var url = 'https://finnhub.io/api/v1/quote?symbol=' + symbol + '&token=' + FINNHUB_TOKEN;
    var r = await fetchWithTimeout(url, 10000);
    if(!r.ok) throw new Error('status ' + r.status);
    var j = await r.json();
    // c = current price, pc = previous close
    var price = j && j.c && j.c > 0 ? j.c : null;
    if(price) return price;
  } catch(e){ console.warn('Finnhub ' + symbol + ': ' + e.message); }
  return null;
}

// Fetch price for any stock: BR uses Brapi, USD uses Finnhub
async function fetchPrice(sym){
  // BR stocks end in .SA
  if(sym && sym.endsWith('.SA')){
    var brSym = sym.replace('.SA','');
    return await fetchBrapiPrice(brSym);
  } else {
    return await fetchFinnhubPrice(sym);
  }
}

async function fetchAllPrices(acoes){
  var fetched = {};
  for(var i = 0; i < acoes.length; i++){
    var acao = acoes[i];
    if(priceCache[acao] !== undefined) continue;
    var sym = tickerMap[acao];
    if(!sym){ console.warn('No ticker for: ' + acao); continue; }

    // Reuse if same symbol already fetched (e.g. FEVR and FEVR CS share FEVR.L)
    if(fetched[sym] !== undefined){
      priceCache[acao] = fetched[sym];
      continue;
    }

    var price = null;
    if(sym.endsWith('.SA')){
      // BR stock → Brapi (strip .SA)
      price = await fetchBrapiPrice(sym.replace('.SA',''));
    } else if(sym.endsWith('.L')){
      // London stock → Finnhub with exchange prefix
      price = await fetchFinnhubPrice('LSE:' + sym.replace('.L',''));
      // Fallback: try without prefix
      if(price === null) price = await fetchFinnhubPrice(sym);
    } else {
      // US stock → Finnhub
      price = await fetchFinnhubPrice(sym);
    }

    fetched[sym] = price;
    if(price !== null) priceCache[acao] = price;
    console.log('Pregao ' + acao + ' (' + sym + '): ' + price);
  }
}

async function loadPregao(){
  var acoes = [];
  investimentos.forEach(function(i){
    if(allInvestors.includes(i.inv) && i.ultimo && i.ultimo !== 0 && acoes.indexOf(i.acao) === -1)
      acoes.push(i.acao);
  });

  var statusEl = document.getElementById('pregao-status');
  if(statusEl) statusEl.textContent = 'Buscando ' + acoes.length + ' cotacoes...';

  await fetchAllPrices(acoes);

  var now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  var loaded = 0, failed = 0;

  allInvestors.forEach(function(inv){
    var data = investimentos
      .filter(function(i){ return i.inv === inv && i.ultimo && i.ultimo !== 0; })
      .sort(function(a,b){ return a.acao.localeCompare(b.acao, 'pt-BR'); });
    if(!data.length) return;

    var isN = inv === 'NUNAM';
    var cur = isN ? '$' : 'R$';
    var ik = inv.replace(/\s/g, '_');
    var tR = 0, tI = 0, tA = 0;

    data.forEach(function(d){
      var price = priceCache[d.acao];
      var tr = document.getElementById('pr-' + ik + '-' + d.acao.replace(/[\s.]/g, '_'));
      if(!tr) return;

      if(price == null){
        failed++;
        tr.cells[3].innerHTML = '<span style="color:var(--muted);font-size:11px;">N/D</span>';
        tr.cells[4].innerHTML = '-';
        tr.cells[5].innerHTML = '-';
        return;
      }

      loaded++;
      var res = (price - d.compra) * d.qtde;
      var pct = d.compra > 0 ? ((price - d.compra) / d.compra) * 100 : 0;
      tI += d.compra * d.qtde;
      tA += price * d.qtde;
      tR += res;

      var diff = price - d.ultimo;
      var trend = diff > 0.001
        ? '<span style="color:var(--green)">&#9650;</span>'
        : diff < -0.001
          ? '<span style="color:var(--red)">&#9660;</span>'
          : '<span style="color:var(--muted)">&#9679;</span>';
      var rC = res >= 0 ? 'var(--green)' : 'var(--red)';
      var pC = pct >= 0 ? 'var(--green)' : 'var(--red)';

      tr.cells[3].innerHTML = '<strong>' + fmt(price, 2) + '</strong> ' + trend;
      tr.cells[4].innerHTML = '<span style="color:' + rC + ';font-weight:600;">' + (res >= 0 ? '+' : '') + fmt(res, 2) + '</span>';
      tr.cells[5].innerHTML = '<span style="color:' + pC + ';font-weight:600;">' + (pct >= 0 ? '+' : '') + fmt(pct, 2) + '%</span>';
    });

    var totEl = document.getElementById('ptot-' + ik);
    if(totEl && tI > 0){
      var tP = ((tA - tI) / tI) * 100;
      var tC = tR >= 0 ? 'var(--green)' : 'var(--red)';
      totEl.innerHTML =
        '<span style="color:' + tC + ';font-weight:700;">' +
        (tR >= 0 ? '+' : '') + cur + ' ' + fmt(tR) +
        ' &nbsp; ' + (tP >= 0 ? '+' : '') + fmt(tP, 2) + '%' +
        '</span>';
    } else if(totEl){
      totEl.textContent = 'cotacoes parciais';
    }
  });

  if(statusEl){
    if(loaded === 0)
      statusEl.textContent = 'Sem cotacoes - fora do horario de mercado ou sem conexao';
    else
      statusEl.textContent = loaded + ' cotacoes | ' + now + (failed ? ' | ' + failed + ' N/D' : '');
  }
}

}

// ── VENDAS REALIZADAS ────────────────────────────────
function renderVendasView(){
  const frag=document.createDocumentFragment();
  const st=document.createElement('div'); st.className='section-title'; st.style.marginTop='4px';
  st.textContent='Vendas Realizadas por Investidor'; frag.appendChild(st);

  // Month names
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Convert dd/mm/yyyy → {month:0-11, year, sort key}
  const parseMes = d => {
    if(!d) return null;
    const [dd,mm,yy] = d.split('/');
    return {m:parseInt(mm)-1, y:parseInt(yy), key:yy+mm};
  };

  // Short date dd/mm/aa
  const shortDate = d => {
    if(!d) return '—';
    const parts = d.split('/');
    return `${parts[0]}/${parts[1]}/${parts[2].slice(-2)}`;
  };

  allInvestors.forEach(inv=>{
    const vendas=vendasRealizadas[inv]||[];
    if(!vendas.length) return;
    const isN=inv==='NUNAM'; const cur=isN?'$':'R$';
    const tR=vendas.reduce((s,v)=>s+v.r,0);
    const tC=vendas.reduce((s,v)=>s+v.ct,0);
    const tV=vendas.reduce((s,v)=>s+v.vt,0);
    const pT=tC>0?((tR/tC)*100):0;

    // Group by month
    const byMonth={};
    vendas.forEach(v=>{
      const info=parseMes(v.d);
      if(!info) return;
      const key=info.key;
      if(!byMonth[key]) byMonth[key]={label:`${meses[info.m]}/${info.y}`,items:[],m:info.m,y:info.y};
      byMonth[key].items.push(v);
    });
    const monthKeys=Object.keys(byMonth).sort();

    const blk=document.createElement('div'); blk.className='vendas-block';
    const ih=document.createElement('div'); ih.className='vendas-inv-header';
    ih.innerHTML=`
      <div class="vendas-inv-name">${inv}</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:${tR>=0?'var(--green)':'var(--red)'}">
          ${tR>=0?'+':''}${cur} ${fmt(tR)} · ${(pT>=0?'+':'')+fmt(pT,2)}% · ${vendas.length} ops
        </span>
        <span class="chevron">▼</span>
      </div>`;

    const bd=document.createElement('div'); bd.className='vendas-body';
    const sc=document.createElement('div'); sc.className='table-scroll';
    const tbl=document.createElement('table');
    tbl.innerHTML=`<thead><tr>
      <th>Ação</th><th>Data</th><th>Qtde</th>
      <th>C.Unit</th><th>C.Total</th>
      <th>V.Unit</th><th>V.Total</th>
      <th>Resultado</th><th>%</th>
    </tr></thead>`;
    const tbody=document.createElement('tbody');

    monthKeys.forEach(key=>{
      const grp=byMonth[key];
      // Month header row
      const mhdr=document.createElement('tr');
      mhdr.innerHTML=`<td colspan="9" style="
        text-align:left;color:var(--accent);font-family:'Syne',sans-serif;
        font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
        background:rgba(0,212,255,0.06);padding:6px 12px;border-bottom:1px solid var(--border);
      ">${grp.label}</td>`;
      tbody.appendChild(mhdr);

      // Rows for this month
      let mR=0,mC=0,mV=0;
      grp.items.forEach(v=>{
        mR+=v.r; mC+=v.ct; mV+=v.vt;
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td>${v.a}</td>
          <td style="text-align:right;color:var(--muted)">${shortDate(v.d)}</td>
          <td>${fmt(v.q,0)}</td>
          <td>${fmt(v.cu,2)}</td><td>${fmt(v.ct,2)}</td>
          <td>${fmt(v.vu,2)}</td><td>${fmt(v.vt,2)}</td>
          <td class="${v.r>=0?'positive':'negative'}">${(v.r>=0?'+':'')}${fmt(v.r,2)}</td>
          <td class="${v.p>=0?'positive':'negative'}">${(v.p>=0?'+':'')}${fmt(v.p,2)}%</td>`;
        tbody.appendChild(tr);
      });

      // Monthly subtotal row
      const mpct=mC>0?((mR/mC)*100):0;
      const mtr=document.createElement('tr');
      mtr.style.cssText='background:rgba(0,0,0,0.2);';
      mtr.innerHTML=`
        <td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;">Subtotal ${grp.label}</td>
        <td>—</td><td>—</td><td>—</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;">${fmt(mC,2)}</td>
        <td>—</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;">${fmt(mV,2)}</td>
        <td class="${mR>=0?'positive':'negative'}" style="font-weight:700;">${(mR>=0?'+':'')}${fmt(mR,2)}</td>
        <td class="${mpct>=0?'positive':'negative'}" style="font-weight:700;">${(mpct>=0?'+':'')}${fmt(mpct,2)}%</td>`;
      tbody.appendChild(mtr);
    });

    // Grand total
    const ttr=document.createElement('tr'); ttr.className='total-row';
    ttr.innerHTML=`<td>TOTAL GERAL</td><td>—</td><td>—</td><td>—</td>
      <td>${fmt(tC,2)}</td><td>—</td><td>${fmt(tV,2)}</td>
      <td class="${tR>=0?'positive':'negative'}">${(tR>=0?'+':'')}${fmt(tR,2)}</td>
      <td class="${pT>=0?'positive':'negative'}">${(pT>=0?'+':'')}${fmt(pT,2)}%</td>`;
    tbody.appendChild(ttr);

    tbl.appendChild(tbody); sc.appendChild(tbl); bd.appendChild(sc);
    blk.appendChild(ih); blk.appendChild(bd); frag.appendChild(blk);

    let open=false;
    ih.onclick=()=>{
      open=!open; bd.style.display=open?'block':'none';
      ih.querySelector('.chevron').style.transform=open?'rotate(180deg)':'';
    };
  });
  return frag;
}

var historicoPriceCache = {};

async function fetchHistoricoPrice(acao){
  var sym = historicoTickerMap[acao];
  if(sym === null) return null;   // known delisted/unavailable
  if(sym === undefined) sym = acao;
  if(historicoPriceCache[sym] !== undefined) return historicoPriceCache[sym];

  var price = await fetchPrice(sym);
  historicoPriceCache[sym] = price;
  return price;
}

function renderHistoricoView(container){
  var frag = document.createDocumentFragment();

  // Header with status
  var hdrBar = document.createElement('div');
  hdrBar.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:4px;flex-wrap:wrap;';
  hdrBar.innerHTML =
    '<span style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex:1;">Historico - Acoes Vendidas</span>' +
    '<span id="hist-status" style="font-size:11px;color:var(--muted);font-family:monospace;">Buscando cotacoes...</span>' +
    '<button onclick="refreshHistorico()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;">&#8635; Atualizar</button>';
  frag.appendChild(hdrBar);

  var note = document.createElement('div');
  note.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;';
  note.textContent = 'Cotacao atual buscada automaticamente via Yahoo Finance. Acoes deslistadas ou sem dados aparecem como N/D.';
  frag.appendChild(note);

  allInvestors.forEach(function(inv){
    var lista = (historicoVendas[inv] || []).slice().sort(function(a,b){ return a.a.localeCompare(b.a,'pt-BR'); });
    if(!lista.length) return;
    var isN = inv === 'NUNAM';
    var cur = isN ? '$' : 'R$';
    var ik = inv.replace(/\s/g,'_');

    var blk = document.createElement('div');
    blk.style.marginBottom = '16px';

    var hdr = document.createElement('div');
    hdr.className = 'vendas-inv-header';
    hdr.style.borderRadius = '12px';
    hdr.innerHTML =
      '<div class="vendas-inv-name">' + inv + '</div>' +
      '<div style="display:flex;gap:10px;align-items:center;">' +
        '<span style="font-family:monospace;font-size:12px;color:var(--muted);">' + lista.length + ' acoes</span>' +
        '<span class="chevron">&#9660;</span>' +
      '</div>';
    blk.appendChild(hdr);

    var bd = document.createElement('div');
    bd.className = 'vendas-body';
    var sc = document.createElement('div');
    sc.className = 'table-scroll';

    var tbl = document.createElement('table');
    tbl.innerHTML =
      '<thead><tr>' +
      '<th style="text-align:left">Acao</th>' +
      '<th>Ultima Venda</th>' +
      '<th>Vl. Venda ' + cur + '</th>' +
      '<th>Cotacao Atual</th>' +
      '<th>Var. %</th>' +
      '</tr></thead>';

    var tbody = document.createElement('tbody');
    lista.forEach(function(item){
      var tr = document.createElement('tr');
      tr.id = 'hist-' + ik + '-' + item.a.replace(/[\s.]/g,'_');
      tr.innerHTML =
        '<td>' + item.a + '</td>' +
        '<td style="text-align:right;color:var(--muted);">' + item.d + '</td>' +
        '<td style="text-align:right;font-family:monospace;">' + fmt(item.v, 2) + '</td>' +
        '<td style="text-align:right;color:var(--muted);font-size:11px;">...</td>' +
        '<td style="text-align:right;color:var(--muted);">-</td>';
      tbody.appendChild(tr);
    });

    tbl.appendChild(tbody);
    sc.appendChild(tbl);
    bd.appendChild(sc);
    blk.appendChild(bd);
    frag.appendChild(blk);

    var open = false;
    hdr.onclick = function(){
      open = !open;
      bd.style.display = open ? 'block' : 'none';
      hdr.querySelector('.chevron').style.transform = open ? 'rotate(180deg)' : '';
    };
  });

  container.appendChild(frag);

  // Load prices asynchronously
  loadHistoricoPrices();
}

async function loadHistoricoPrices(){
  var statusEl = document.getElementById('hist-status');
  var loaded = 0, failed = 0, total = 0;

  // Collect all unique acoes
  var allAcoes = [];
  allInvestors.forEach(function(inv){
    (historicoVendas[inv]||[]).forEach(function(item){
      if(allAcoes.indexOf(item.a) === -1) allAcoes.push(item.a);
    });
  });
  total = allAcoes.length;

  // Fetch prices sequentially to avoid rate limiting
  for(var i = 0; i < allAcoes.length; i++){
    var acao = allAcoes[i];
    var price = await fetchHistoricoPrice(acao);

    // Update all rows with this acao across all investors
    allInvestors.forEach(function(inv){
      var isN = inv === 'NUNAM';
      var ik = inv.replace(/\s/g,'_');
      var lista = historicoVendas[inv] || [];
      lista.forEach(function(item){
        if(item.a !== acao) return;
        var tr = document.getElementById('hist-' + ik + '-' + item.a.replace(/[\s.]/g,'_'));
        if(!tr) return;
        if(price === null){
          tr.cells[3].innerHTML = '<span style="color:var(--muted);font-size:11px;">N/D</span>';
          tr.cells[4].innerHTML = '<span style="color:var(--muted);">-</span>';
        } else {
          var pct = item.v > 0 ? ((price - item.v) / item.v) * 100 : 0;
          var pC = pct >= 0 ? 'var(--green)' : 'var(--red)';
          tr.cells[3].innerHTML = '<span style="font-family:monospace;font-weight:600;">' + fmt(price,2) + '</span>';
          tr.cells[4].innerHTML = '<span style="color:' + pC + ';font-weight:600;">' + (pct>=0?'+':'') + fmt(pct,1) + '%</span>';
        }
      });
    });

    if(price !== null) loaded++; else failed++;
    if(statusEl) statusEl.textContent = 'Carregando... ' + (i+1) + '/' + total;
  }

  var now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(statusEl) statusEl.textContent = loaded + ' cotacoes | ' + now + (failed ? ' | ' + failed + ' N/D' : '');
}

function refreshHistorico(){
  Object.keys(historicoPriceCache).forEach(function(k){ delete historicoPriceCache[k]; });
  var el = document.getElementById('app-content');
  if(el){ el.innerHTML=''; renderHistoricoView(el); }
}

// ── EXTRATO POR AÇÃO ─────────────────────────────────
// histLedger columns: [data, op, qtde, unit, total, custo, lucro, pct, saldo_q, saldo_u]
var extratoSelectedInv = 'LEONILDES XP';
var extratoSelectedAcao = null;

function renderExtratoView(container){
  var frag = document.createDocumentFragment();

  // Header
  var hdrBar = document.createElement('div');
  hdrBar.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:4px;flex-wrap:wrap;';
  hdrBar.innerHTML = '<span style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Extrato por Acao</span>';
  frag.appendChild(hdrBar);

  // Investor chips
  var invScroll = document.createElement('div');
  invScroll.className = 'investor-scroll';
  allInvestors.forEach(function(inv){
    var chip = document.createElement('div');
    chip.className = 'investor-chip' + (inv === extratoSelectedInv ? ' active' : '');
    chip.textContent = inv;
    chip.onclick = function(){
      extratoSelectedInv = inv;
      extratoSelectedAcao = null;
      var el = document.getElementById('app-content');
      el.innerHTML = ''; renderExtratoView(el);
    };
    invScroll.appendChild(chip);
  });
  frag.appendChild(invScroll);

  // Stock list for selected investor
  var acoes = Object.keys(histLedger[extratoSelectedInv] || {}).sort(function(a,b){ return a.localeCompare(b,'pt-BR'); });
  var isNunam = extratoSelectedInv === 'NUNAM';

  // Stock chips
  var acaoScroll = document.createElement('div');
  acaoScroll.className = 'investor-scroll';
  acaoScroll.style.cssText = 'display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;flex-wrap:nowrap;white-space:nowrap;';
  acoes.forEach(function(a){
    var chip = document.createElement('div');
    chip.className = 'investor-chip' + (a === extratoSelectedAcao ? ' active' : '');
    chip.textContent = a;
    chip.style.fontFamily = 'DM Mono, monospace';
    chip.onclick = function(){
      extratoSelectedAcao = a;
      var el = document.getElementById('app-content');
      el.innerHTML = ''; renderExtratoView(el);
    };
    acaoScroll.appendChild(chip);
  });
  frag.appendChild(acaoScroll);

  if(!extratoSelectedAcao){
    var hint = document.createElement('div');
    hint.className = 'empty-state';
    hint.textContent = 'Selecione uma acao acima para ver o extrato completo.';
    frag.appendChild(hint);
    container.appendChild(frag);
    return;
  }

  // Render ledger for selected stock
  var ledger = histLedger[extratoSelectedInv][extratoSelectedAcao] || [];
  var cur = isNunam ? '$' : 'R$';

  // Group by year
  var byYear = {};
  ledger.forEach(function(r){
    var ano = r[0].split('/')[2]; // extract year from dd/mm/yyyy
    if(!byYear[ano]) byYear[ano] = [];
    byYear[ano].push(r);
  });

  var years = Object.keys(byYear).sort();

  // Summary totals
  var totalLucro = 0;
  ledger.forEach(function(r){ if(r[6] !== null) totalLucro += r[6]; });

  var summaryBar = document.createElement('div');
  summaryBar.style.cssText = 'display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;';

  var cards = [
    {label:'Ação', val: extratoSelectedAcao, cls:''},
    {label:'Investidor', val: extratoSelectedInv, cls:''},
    {label:'Resultado Total '+cur, val:(totalLucro>=0?'+':'')+fmt(totalLucro), cls: totalLucro>=0?'green':'red'},
  ];
  // Current position
  var lastRow = ledger[ledger.length-1];
  if(lastRow && lastRow[8] > 0){
    cards.push({label:'Saldo Atual', val: fmt(lastRow[8],0)+' @ '+cur+' '+fmt(lastRow[9],2), cls:'yellow'});
  }
  cards.forEach(function(c){
    var card = document.createElement('div');
    card.className = 'summary-card ' + c.cls;
    card.style.flex = '1';
    card.style.minWidth = '140px';
    card.innerHTML = '<div class="card-label">'+c.label+'</div><div class="card-value">'+c.val+'</div>';
    summaryBar.appendChild(card);
  });
  frag.appendChild(summaryBar);

  // Table per year
  years.forEach(function(ano){
    var rows = byYear[ano];
    // Skip SD-only years (just carry-forward)
    var hasOps = rows.some(function(r){ return r[1] !== 'SD'; });

    var secTitle = document.createElement('div');
    secTitle.className = 'section-title';
    secTitle.textContent = ano;
    frag.appendChild(secTitle);

    var tableWrap = document.createElement('div');
    tableWrap.className = 'table-wrap';
    var scroll = document.createElement('div');
    scroll.className = 'table-scroll';

    var tbl = document.createElement('table');
    tbl.innerHTML = '<thead><tr>' +
      '<th style="text-align:left">Data</th>' +
      '<th style="text-align:left">Op</th>' +
      '<th>Qtde</th>' +
      '<th>P.U. '+cur+'</th>' +
      '<th>Total '+cur+'</th>' +
      '<th>Custo '+cur+'</th>' +
      '<th>Lucro/Prej. '+cur+'</th>' +
      '<th>%</th>' +
      '<th>Saldo Qtde</th>' +
      '<th>Saldo P.U.</th>' +
      '</tr></thead>';

    var tbody = document.createElement('tbody');
    var anoLucro = 0;
    rows.forEach(function(r){
      // r: [data, op, qtde, unit, total, custo, lucro, pct, saldo_q, saldo_u]
      var tr = document.createElement('tr');
      var opColor = r[1]==='CP' ? 'var(--green)' : r[1]==='VD' ? 'var(--red)' : r[1]==='DT' ? 'var(--yellow)' : 'var(--muted)';
      var lucroCell = r[6]!==null ? '<span style="color:'+(r[6]>=0?'var(--green)':'var(--red)')+';font-weight:600;">'+(r[6]>=0?'+':'')+fmt(r[6])+'</span>' : '—';
      var pctCell = r[7]!==null ? '<span style="color:'+(r[7]>=0?'var(--green)':'var(--red)')+'">'+(r[7]>=0?'+':'')+fmt(r[7],2)+'%</span>' : '—';
      if(r[6]!==null) anoLucro += r[6];

      tr.innerHTML =
        '<td style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted)">'+r[0]+'</td>' +
        '<td><span style="font-weight:700;color:'+opColor+'">'+r[1]+'</span></td>' +
        '<td>'+fmt(r[2],0)+'</td>' +
        '<td>'+fmt(r[3],2)+'</td>' +
        '<td>'+fmt(r[4],2)+'</td>' +
        '<td>'+(r[5]!==null?fmt(r[5],2):'—')+'</td>' +
        '<td>'+lucroCell+'</td>' +
        '<td>'+pctCell+'</td>' +
        '<td style="color:var(--accent)">'+fmt(r[8],0)+'</td>' +
        '<td>'+(r[9]>0?fmt(r[9],2):'—')+'</td>';
      tbody.appendChild(tr);
    });

    // Year subtotal if has sales
    var hasSales = rows.some(function(r){ return r[1]==='VD'; });
    if(hasSales){
      var totTr = document.createElement('tr');
      totTr.className = 'total-row';
      totTr.innerHTML =
        '<td colspan="6" style="text-align:right;font-size:11px;color:var(--muted);">Resultado '+ano+'</td>' +
        '<td><span style="color:'+(anoLucro>=0?'var(--green)':'var(--red)')+';font-weight:700;">'+(anoLucro>=0?'+':'')+fmt(anoLucro)+'</span></td>' +
        '<td colspan="3"></td>';
      tbody.appendChild(totTr);
    }

    tbl.appendChild(tbody);
    scroll.appendChild(tbl);
    tableWrap.appendChild(scroll);
    frag.appendChild(tableWrap);
  });

  container.appendChild(frag);
}

// Init
document.getElementById('date-display').textContent=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
renderContent();
</script>
